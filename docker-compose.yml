# ========================================
# DZS-OS Docker Compose — 开发/部署环境
# ========================================

services:
  # ===================== 数据库 =====================
  mongodb:
    image: mongo:7
    container_name: dzs-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      MONGO_INITDB_DATABASE: dzs_os
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: dzs_dev_pass
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dzs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== V2 后端 =====================
  server-v2:
    build:
      context: .
      dockerfile: packages/server-v2/Dockerfile
    container_name: dzs-server-v2
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://admin:dzs_dev_pass@mongodb:27017/dzs_os?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - JWT_SECRET=dzs-dev-jwt-secret-change-in-production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===================== V1 后端（兼容） =====================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: dzs-server-v1
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://admin:dzs_dev_pass@mongodb:27017/dzs_os?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy

  # ===================== Web 前端 =====================
  web-console:
    build:
      context: .
      dockerfile: apps/web-console/Dockerfile
    container_name: dzs-web-console
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=/api/v2
    depends_on:
      - server-v2

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
